<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'none'; base-uri 'none'; form-action 'none'">
<title>TimeTracker</title>
<style>
  :root { --bg:#0b0f17; --card:#141b27; --card2:#1b2433; --line:#26303f; --txt:#e6edf6; --mut:#7d8aa0; --accent:#22d3ee; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--txt); padding:16px; user-select:none; max-width:820px; margin:0 auto; }
  .topbar { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:14px; }
  .brand { display:flex; align-items:center; gap:7px; font-weight:700; font-size:15px; }
  .brand .logo { font-size:18px; }
  .lang-wrap { display:flex; align-items:center; gap:6px; color:var(--mut); font-size:12px; }
  select.lang { background:#0d141f; color:var(--txt); border:1px solid var(--line); border-radius:8px; padding:6px 8px; font-size:13px; max-width:150px; }
  .active-panel { background:linear-gradient(135deg,#141b27,#1b2433); border:1px solid var(--line); border-radius:14px; padding:18px; margin-bottom:16px; text-align:center; }
  .active-name { font-size:18px; font-weight:600; margin-bottom:6px; }
  .active-time { font-size:40px; font-weight:700; font-variant-numeric:tabular-nums; }
  .active-idle { color:var(--mut); font-size:12px; margin-top:6px; }
  .list { display:flex; flex-direction:column; gap:8px; }
  .proj { display:flex; align-items:center; gap:10px; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px 14px; cursor:pointer; transition:.15s; }
  .proj:hover { border-color:var(--accent); }
  .proj.on { background:var(--card2); box-shadow:inset 3px 0 0 0 var(--p); }
  [dir=rtl] .proj.on { box-shadow:inset -3px 0 0 0 var(--p); }
  .dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
  .proj .info { flex:1; min-width:0; }
  .proj .nm { font-weight:600; font-size:14px; }
  .proj .meta { font-size:11px; color:var(--mut); margin-top:2px; }
  .hk { font-size:11px; color:var(--mut); background:#0d141f; border:1px solid var(--line); border-radius:6px; padding:3px 7px; font-variant-numeric:tabular-nums; white-space:nowrap; }
  .proj .tt { font-variant-numeric:tabular-nums; font-size:13px; min-width:62px; text-align:right; }
  [dir=rtl] .proj .tt { text-align:left; }
  .row { display:flex; gap:8px; margin-top:14px; }
  button { background:var(--card2); color:var(--txt); border:1px solid var(--line); border-radius:9px; padding:9px 12px; font-size:13px; cursor:pointer; }
  button:hover { border-color:var(--accent); }
  button.primary { background:var(--accent); color:#04222a; border:none; font-weight:600; }
  button.danger { color:#ff8a8a; }
  button.mini { padding:6px 10px; font-size:12px; }
  .sec { margin-top:22px; }
  .sec-title { font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:var(--mut); margin-bottom:8px; }
  .stats { display:flex; gap:8px; }
  .stat { flex:1; background:var(--card); border:1px solid var(--line); border-radius:10px; padding:10px; text-align:center; }
  .stat .v { font-size:18px; font-weight:700; font-variant-numeric:tabular-nums; }
  .stat .l { font-size:10px; color:var(--mut); text-transform:uppercase; margin-top:2px; }
  input,select,textarea { background:#0d141f; color:var(--txt); border:1px solid var(--line); border-radius:8px; padding:8px; font-size:13px; font-family:inherit; }
  textarea { resize:vertical; width:100%; }
  .form, .settings { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:10px; display:flex; flex-direction:column; gap:8px; }
  .frow { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  #nName { flex:1 1 120px; } #nKey { width:46px; text-align:center; } #nRate { width:70px; } #nColor { width:42px; height:36px; padding:2px; }
  #nVat { flex:1 1 140px; } #nAddr { flex:2 1 180px; }
  .set-row { display:flex; align-items:center; justify-content:space-between; gap:10px; font-size:13px; }
  .set-row input[type=number] { width:64px; }
  .x { color:var(--mut); cursor:pointer; padding:4px 6px; }
  .x:hover { color:var(--accent); } .x.del:hover { color:#ff8a8a; }
  .hint { font-size:11px; color:var(--mut); margin-top:6px; line-height:1.5; }
  table.rep { width:100%; border-collapse:collapse; font-size:13px; margin-top:4px; }
  table.rep th { text-align:left; color:var(--mut); font-size:10px; text-transform:uppercase; padding:6px 8px; border-bottom:1px solid var(--line); }
  table.rep td { padding:8px; border-bottom:1px solid var(--line); font-variant-numeric:tabular-nums; }
  table.rep td.num { text-align:right; }
  [dir=rtl] table.rep th { text-align:right; }
  table.rep tr.tot td { font-weight:700; border-top:2px solid var(--accent); border-bottom:none; }
  .chip { display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:7px; }
  [dir=rtl] .chip { margin-right:0; margin-left:7px; }

  /* Responsive: schermi stretti */
  @media (max-width:400px){
    body { padding:11px; }
    .active-panel { padding:14px; }
    .active-time { font-size:32px; }
    .stat .v { font-size:15px; }
    .proj { padding:10px 11px; gap:8px; }
    .proj .tt { min-width:54px; }
  }
  /* Responsive: schermi larghi — i moduli affiancati */
  @media (min-width:680px){
    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; align-items:start; }
    .grid2 .sec { margin-top:0; }
  }
</style>
</head>
<body>
  <div class="topbar">
    <div class="brand"><span class="logo">⏱</span><span>TimeTracker</span></div>
    <div class="lang-wrap"><span>🌐</span><span data-i18n="language">Lingua</span><select class="lang" id="langSel"></select></div>
  </div>

  <div class="active-panel">
    <div class="active-name" id="aName">Nessun timer attivo</div>
    <div class="active-time" id="aTime">00:00:00</div>
    <div class="active-idle" id="aHint"></div>
  </div>

  <div class="sec">
    <div class="sec-title" data-i18n="projects">Progetti</div>
    <div class="list" id="list"></div>
    <div class="row"><button class="primary" id="stopBtn" style="flex:1" data-i18n="stopAll">Ferma tutto</button></div>
  </div>

  <div class="sec">
    <div class="sec-title" data-i18n="summaryToday">Riepilogo oggi</div>
    <div class="stats" id="stats"></div>
  </div>

  <div class="sec">
    <div class="sec-title" data-i18n="report">Report</div>
    <div class="frow">
      <button class="mini" data-period="week" data-i18n="week">Settimana</button>
      <button class="mini" data-period="lastweek" data-i18n="lastWeekBtn">Sett. scorsa</button>
      <button class="mini" data-period="month" data-i18n="month">Mese</button>
      <button class="mini" data-period="lastmonth" data-i18n="lastMonthBtn">Mese scorso</button>
    </div>
    <div class="frow" style="margin-top:8px">
      <input type="date" id="rFrom" style="flex:1">
      <input type="date" id="rTo" style="flex:1">
      <button class="mini" id="rApply" data-i18n="go">Vai</button>
    </div>
    <div id="reportLabel" class="hint"></div>
    <div id="reportTable" style="margin-top:6px"></div>
    <div class="row" style="margin-top:10px">
      <button id="csvBtn" style="flex:1" data-i18n="exportCsv">Esporta CSV</button>
      <button id="pdfBtn" style="flex:1" data-i18n="exportPdfReport">Esporta PDF report</button>
    </div>
  </div>

  <div class="sec">
    <div class="sec-title" data-i18n="generateInvoice">Genera fattura</div>
    <div class="settings">
      <select id="invClient"></select>
      <div class="frow">
        <input id="invNumber" data-i18n-ph="invNumberPh" placeholder="N° fattura" style="flex:1">
        <input id="invDate" type="date" style="flex:1">
      </div>
      <div class="hint" id="invHint"></div>
      <button class="primary" id="invBtn" data-i18n="generateInvoicePdf">Genera fattura PDF</button>
    </div>
  </div>

  <div class="grid2">
  <div class="sec">
    <div class="sec-title" id="formTitle" data-i18n="addProjectClient">Aggiungi progetto / cliente</div>
    <div class="form">
      <div class="frow">
        <input id="nName" data-i18n-ph="clientNamePh" placeholder="Nome cliente">
        <input id="nKey" data-i18n-ph="keyPh" placeholder="Tasto" maxlength="1">
        <input id="nRate" type="number" data-i18n-ph="ratePh" placeholder="€/h" min="0" step="1">
        <input id="nColor" type="color" value="#22d3ee">
      </div>
      <div class="frow">
        <input id="nVat" data-i18n-ph="vatClientPh" placeholder="P.IVA / C.F. cliente">
        <input id="nAddr" data-i18n-ph="addrClientPh" placeholder="Indirizzo cliente">
      </div>
      <div class="frow">
        <button id="addBtn" data-i18n="add">Aggiungi</button>
        <button id="cancelEdit" style="display:none" data-i18n="cancel">Annulla</button>
      </div>
    </div>
    <div class="hint" id="hkHint"></div>
  </div>

  <div class="sec">
    <div class="sec-title" data-i18n="issuerData">Dati emittente (per fattura)</div>
    <div class="settings">
      <input id="iName" data-i18n-ph="namePh" placeholder="Nome / Ragione sociale">
      <div class="frow"><input id="iVat" data-i18n-ph="vatPh" placeholder="P.IVA" style="flex:1"><input id="iCf" data-i18n-ph="cfPh" placeholder="Cod. Fiscale" style="flex:1"></div>
      <textarea id="iAddr" data-i18n-ph="addressPh" placeholder="Indirizzo" rows="2"></textarea>
      <input id="iIban" data-i18n-ph="ibanPh" placeholder="IBAN">
      <div class="frow"><input id="iPrefix" data-i18n-ph="prefixPh" placeholder="Prefisso n° (es. 2026/)" style="flex:1"><input id="iIva" type="number" data-i18n-ph="ivaPh" placeholder="IVA %" min="0" max="100" style="width:90px"></div>
      <textarea id="iNote" data-i18n-ph="notePh" placeholder="Nota in fattura (regime fiscale, scadenza pagamento, marca da bollo...)" rows="2"></textarea>
    </div>
  </div>
  </div>

  <div class="sec">
    <div class="sec-title" data-i18n="settings">Impostazioni</div>
    <div class="settings">
      <div class="set-row"><span data-i18n="screenshotEvery">Screenshot ogni (min)</span><input type="number" id="sShot" min="1" max="120"></div>
      <div class="set-row"><span data-i18n="autoPauseAfter">Auto-pausa dopo inattività (min)</span><input type="number" id="sIdle" min="1" max="120"></div>
      <div class="set-row"><span data-i18n="screenshotsActive">Screenshot attivi</span><input type="checkbox" id="sOn"></div>
      <div class="row" style="margin-top:0">
        <button id="folderBtn" style="flex:1" data-i18n="openScreenshotFolder">Apri cartella screenshot</button>
        <button class="danger" id="resetBtn" data-i18n="resetData">Reset dati</button>
      </div>
    </div>
  </div>

<script src="i18n.js"></script>
<script src="renderer.js"></script>
</body>
</html>
